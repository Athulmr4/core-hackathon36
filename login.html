<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – FraudShield</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    body {
      background: radial-gradient(circle at 50% 0%, #1a1c2c 0%, #050812 100%);
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      margin: 0;
    }
    
    .auth-glow {
      position: absolute; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
      top: -200px; z-index: -1;
    }

    .auth-container {
      width: 100%; max-width: 440px; padding: 3rem;
      background: rgba(13, 17, 34, 0.6);
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
      animation: authIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes authIn { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .logo-badge {
      width: 60px; height: 60px; background: var(--g-brand); border-radius: 18px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4), inset 0 2px rgba(255,255,255,0.3);
    }
    
    .auth-title { font-family: var(--fhead); font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .auth-subtitle { color: var(--t3); text-align: center; margin-bottom: 2.5rem; font-size: 0.95rem; }

    .form-label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--t3); text-transform: uppercase; margin-bottom: 0.75rem; letter-spacing: 0.08em; }
    
    .input-wrap { position: relative; margin-bottom: 1.5rem; }
    .auth-input {
      width: 100%; padding: 16px; background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
      font-size: 1rem; color: #fff; transition: 0.3s;
    }
    .auth-input:focus {
      outline: none; background: rgba(255, 255, 255, 0.07);
      border-color: var(--violet); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
    }

    .btn-auth {
      width: 100%; padding: 18px; background: var(--g-brand); border: none; border-radius: 16px;
      color: #fff; font-size: 1rem; font-weight: 800; font-family: var(--fhead);
      cursor: pointer; transition: 0.3s; margin-top: 1rem;
      box-shadow: 0 15px 30px -5px rgba(124, 58, 237, 0.4);
    }
    .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 25px 40px -10px rgba(124, 58, 237, 0.5); }

    .switch-auth { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--t3); }
    .switch-link { color: var(--violet-lt); text-decoration: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .switch-link:hover { color: #fff; }

  </style>
</head>
<body>
  <div class="auth-glow"></div>
  <div class="auth-container">
    <div class="logo-badge">
       <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L3 6.5v5.5C3 17.5 7 22 12 23c5-1 9-5.5 9-11V6.5L12 2z"/><polyline points="9,12 11,14 15,10"/></svg>
    </div>
    
    <h1 class="auth-title">Welcome</h1>
    <p class="auth-subtitle">Secure your digital financial journey</p>

    <form id="authForm">
      <div>
        <label class="form-label">Full Name</label>
        <div class="input-wrap">
          <input type="text" id="fullname" class="auth-input" placeholder="Rahul Kumar">
        </div>
      </div>
      <div>
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <input type="email" id="email" class="auth-input" placeholder="rahul@example.com" required>
        </div>
      </div>
      <div>
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-auth" id="submitBtn">Create Account</button>
    </form>

    <div class="switch-auth">
      Already have an account? <span class="switch-link" onclick="toggleAuth()">Sign In</span>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let isLogin = false;
    const authForm = document.getElementById('authForm');
    const authTitle = document.querySelector('.auth-title');
    const authSubtitle = document.querySelector('.auth-subtitle');
    const submitBtn = document.getElementById('submitBtn');
    const switchAuth = document.querySelector('.switch-auth');
    const nameField = document.getElementById('fullname').parentElement.parentElement;

    // Check if user is already logged in
    if (localStorage.getItem('fraudshield_user')) {
      window.location.href = 'dashboard.html';
    }

    // Handle ?mode=signin or ?mode=signup from landing page
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'signin') {
      isLogin = true;
      toggleAuth();
    }

    function toggleAuth() {
      isLogin = !isLogin;
      if (isLogin) {
        authTitle.innerText = "Welcome Back";
        authSubtitle.innerText = "Sign in to your protected dashboard";
        submitBtn.innerText = "Sign In";
        switchAuth.innerHTML = `Don't have an account? <span class="switch-link" onclick="toggleAuth()">Create Account</span>`;
        nameField.style.display = 'none';
      } else {
        authTitle.innerText = "Create Account";
        authSubtitle.innerText = "Your personal AI guard for UPI & Payments";
        submitBtn.innerText = "Create Account";
        switchAuth.innerHTML = `Already have an account? <span class="switch-link" onclick="toggleAuth()">Sign In</span>`;
        nameField.style.display = 'block';
      }
    }

    authForm.onsubmit = (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const fullname = document.getElementById('fullname').value.trim();

      if (!email || !password) {
        showToast('Please fill in all fields.', 'danger');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = isLogin ? "Signing in..." : "Creating account...";

      // Simulate a brief loading delay for UX
      setTimeout(() => {
        if (isLogin) {
          // --- Sign In ---
          const storedUsers = JSON.parse(localStorage.getItem('fraudshield_users') || '[]');
          const user = storedUsers.find(u => u.email === email && u.password === password);
          if (user) {
            localStorage.setItem('fraudshield_user', JSON.stringify({
              name: user.name,
              email: user.email,
              initials: user.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)
            }));
            showToast(`Welcome back, ${user.name}!`, 'success');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
          } else {
            showToast('Invalid email or password.', 'danger');
            submitBtn.disabled = false;
            submitBtn.innerText = "Sign In";
          }
        } else {
          // --- Sign Up ---
          if (!fullname) {
            showToast('Please enter your full name.', 'danger');
            submitBtn.disabled = false;
            submitBtn.innerText = "Create Account";
            return;
          }
          const storedUsers = JSON.parse(localStorage.getItem('fraudshield_users') || '[]');
          if (storedUsers.find(u => u.email === email)) {
            showToast('An account with this email already exists. Please sign in.', 'danger');
            submitBtn.disabled = false;
            submitBtn.innerText = "Create Account";
            return;
          }
          // Save new user
          storedUsers.push({ name: fullname, email, password });
          localStorage.setItem('fraudshield_users', JSON.stringify(storedUsers));
          
          // Auto-login after successful signup
          localStorage.setItem('fraudshield_user', JSON.stringify({
            name: fullname,
            email: email,
            initials: fullname.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)
          }));
          
          showToast('Account created successfully!', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
        }
      }, 500);
    };

    // Initial state: if mode was signin, toggleAuth already ran above
    // If mode was signup or default, show signup form (default state)
    if (urlParams.get('mode') === 'signin') {
      // Already handled above
    }
  </script>
</body>
</html>
