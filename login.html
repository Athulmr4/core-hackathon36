<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – FraudShield</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    body {
      background: radial-gradient(circle at 50% 0%, #1a1c2c 0%, #050812 100%);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 1rem; box-sizing: border-box;
    }
    .auth-glow {
      position: fixed; width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(124,58,237,0.14) 0%, transparent 70%);
      top: -200px; left: 50%; transform: translateX(-50%); z-index: -1;
      animation: gDrift 12s ease-in-out infinite alternate;
    }
    @keyframes gDrift { from{transform:translateX(-55%)} to{transform:translateX(-45%)} }
    .auth-container {
      width: 100%; max-width: 440px; padding: 2.5rem;
      background: rgba(13,17,34,0.7); backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.7);
      animation: authIn 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes authIn { from{opacity:0;transform:translateY(30px) scale(0.96)} to{opacity:1;transform:none} }
    .logo-badge {
      width: 56px; height: 56px; background: linear-gradient(135deg,#7c3aed,#0d9488);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; box-shadow: 0 10px 25px rgba(124,58,237,0.45);
    }
    .auth-tabs {
      display: flex; gap: 4px; background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 4px; margin-bottom: 2rem;
    }
    .auth-tab {
      flex: 1; padding: 10px; border-radius: 9px; border: none; cursor: pointer;
      font-size: 0.875rem; font-weight: 700; transition: all 0.25s;
      font-family: inherit; color: rgba(255,255,255,0.4); background: transparent;
    }
    .auth-tab.active { background: linear-gradient(135deg,#7c3aed,#0d9488); color: #fff; box-shadow: 0 4px 15px rgba(124,58,237,0.35); }
    .auth-title { font-size: 1.75rem; font-weight: 800; text-align: center; margin-bottom: 0.4rem; letter-spacing: -0.02em; color: #fff; }
    .auth-subtitle { color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 2rem; font-size: 0.875rem; }
    .form-label { display: block; font-size: 0.72rem; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.08em; }
    .input-wrap { position: relative; margin-bottom: 1.25rem; }
    .auth-input {
      width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09); border-radius: 12px;
      font-size: 0.95rem; color: #fff; transition: all 0.25s;
      box-sizing: border-box; font-family: inherit;
    }
    .auth-input:focus { outline: none; border-color: rgba(124,58,237,0.5); background: rgba(124,58,237,0.05); }
    .btn-auth {
      width: 100%; padding: 16px; background: linear-gradient(135deg,#7c3aed,#0d9488); border: none;
      border-radius: 14px; color: #fff; font-size: 0.975rem; font-weight: 800;
      cursor: pointer; transition: 0.25s; margin-top: 0.5rem;
      box-shadow: 0 12px 28px -5px rgba(124,58,237,0.45);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-auth:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .err-box {
      padding: 12px 14px; background: rgba(244,63,94,0.08);
      border: 1px solid rgba(244,63,94,0.2); border-radius: 10px;
      color: #f87171; font-size: 0.82rem; font-weight: 600;
      margin-bottom: 1.25rem; display: none;
    }
    .err-box.show { display: block; }
    .ok-box {
      padding: 12px 14px; background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2); border-radius: 10px;
      color: #34d399; font-size: 0.82rem; font-weight: 600;
      margin-bottom: 1.25rem; display: none;
    }
    .ok-box.show { display: block; }
    .back-link { display: block; text-align: center; font-size: 0.82rem; color: rgba(255,255,255,0.4); text-decoration: none; margin-top: 1.25rem; }
    .back-link:hover { color: #fff; }
    #panelLogin, #panelSignup { display: none; }
    #panelLogin.active, #panelSignup.active { display: block; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  </style>
</head>
<body>
  <div class="auth-glow"></div>
  <div class="auth-container">
    <div class="logo-badge">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 6.5v5.5C3 17.5 7 22 12 23c5-1 9-5.5 9-11V6.5L12 2z"/>
        <polyline points="9,12 11,14 15,10"/>
      </svg>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>
    <div class="err-box" id="errBox"></div>
    <div class="ok-box" id="okBox"></div>

    <!-- LOGIN -->
    <div id="panelLogin" class="active">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your protected dashboard</p>
      <form id="loginForm">
        <div class="input-wrap">
          <label class="form-label">Username</label>
          <input type="text" id="loginEmail" class="auth-input" placeholder="dhanu@1234" required>
        </div>
        <div class="input-wrap">
          <label class="form-label">Password</label>
          <input type="password" id="loginPassword" class="auth-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-auth" id="loginBtn">Sign In</button>
      </form>
    </div>

    <!-- SIGNUP -->
    <div id="panelSignup">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Your personal AI guard for UPI &amp; Payments</p>
      <form id="signupForm">
        <div class="input-wrap">
          <label class="form-label">Full Name</label>
          <input type="text" id="signupName" class="auth-input" placeholder="Rahul Kumar" required>
        </div>
        <div class="input-wrap">
          <label class="form-label">Email / Username</label>
          <input type="text" id="signupEmail" class="auth-input" placeholder="you@example.com" required>
        </div>
        <div class="input-wrap">
          <label class="form-label">Create Password</label>
          <input type="password" id="signupPassword" class="auth-input" placeholder="Min. 4 characters" required>
        </div>
        <button type="submit" class="btn-auth" id="signupBtn">Create My Account</button>
      </form>
    </div>
    <a href="index.html" class="back-link">← Back to homepage</a>
  </div>

  <!-- NO external JS dependencies — 100% self-contained -->
  <script>
    var BACKEND = 'http://localhost:5001/api';

    // Clean up stale keys
    localStorage.removeItem('fraudshield_user');
    localStorage.removeItem('fraudshield_users');

    function switchTab(t) {
      document.getElementById('panelLogin').className  = t === 'login' ? 'active' : '';
      document.getElementById('panelSignup').className = t === 'signup' ? 'active' : '';
      document.getElementById('tabLogin').className    = 'auth-tab' + (t === 'login' ? ' active' : '');
      document.getElementById('tabSignup').className   = 'auth-tab' + (t === 'signup' ? ' active' : '');
      document.getElementById('errBox').className = 'err-box';
      document.getElementById('okBox').className  = 'ok-box';
    }

    function showErr(msg) { var b=document.getElementById('errBox'); b.textContent=msg; b.className='err-box show'; document.getElementById('okBox').className='ok-box'; }
    function showOk(msg)  { var b=document.getElementById('okBox');  b.textContent=msg; b.className='ok-box show';  document.getElementById('errBox').className='err-box'; }

    // ── LOGIN ──
    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      var email = document.getElementById('loginEmail').value.trim();
      var pass  = document.getElementById('loginPassword').value;
      if (!email || !pass) { showErr('Please fill in all fields.'); return; }

      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span> Signing in...';

      fetch(BACKEND + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: email, password: pass })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success && data.user) {
          localStorage.setItem('fraudshield_session', JSON.stringify(data.user));
          showOk('Welcome back, ' + data.user.fullName + '! Redirecting...');
          setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
        } else {
          showErr(data.detail || 'Invalid username or password.');
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
        }
      })
      .catch(function(err) {
        console.error('Login error:', err);
        showErr('Cannot reach server. Is the backend running on port 5001?');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      });
    };

    // ── SIGNUP ──
    document.getElementById('signupForm').onsubmit = function(e) {
      e.preventDefault();
      var name  = document.getElementById('signupName').value.trim();
      var email = document.getElementById('signupEmail').value.trim();
      var pass  = document.getElementById('signupPassword').value;
      if (!name || !email || !pass) { showErr('Please fill in all fields.'); return; }
      if (pass.length < 4) { showErr('Password must be at least 4 characters.'); return; }

      var btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span> Creating account...';

      fetch(BACKEND + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: email, password: pass, fullName: name })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.success) {
          // Auto-login
          return fetch(BACKEND + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: email, password: pass })
          }).then(function(r) { return r.json(); }).then(function(loginData) {
            if (loginData.success) {
              localStorage.setItem('fraudshield_session', JSON.stringify(loginData.user));
            }
            showOk('Account created! Redirecting to dashboard...');
            setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
          });
        } else {
          showErr(data.detail || 'Registration failed. Try a different username.');
          btn.disabled = false;
          btn.innerHTML = 'Create My Account';
        }
      })
      .catch(function(err) {
        console.error('Signup error:', err);
        showErr('Cannot reach server. Is the backend running on port 5001?');
        btn.disabled = false;
        btn.innerHTML = 'Create My Account';
      });
    };

    // Handle ?tab=signup
    if (new URLSearchParams(location.search).get('tab') === 'signup') switchTab('signup');
  </script>
</body>
</html>
