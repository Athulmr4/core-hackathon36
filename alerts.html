<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Security Alerts – FraudShield</title>
  <meta name="description" content="Review and manage all your security alerts and fraud warnings."/>
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/dashboard.css"/>
  <link rel="stylesheet" href="styles/mobile.css"/>
</head>
<body>
<div class="app-body">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="index.html" class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L3 6.5v5.5C3 17.5 7 22 12 23c5-1 9-5.5 9-11V6.5L12 2z"/><polyline points="9,12 11,14 15,10"/></svg>
      </div>
      <span class="logo-text">FraudShield</span>
    </a>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="dashboard.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="icon"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
      Dashboard
    </a>
    <a href="transaction.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="icon"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/></svg>
      Send Money
    </a>
    <a href="alerts.html" class="nav-item active">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      Alerts
      <span class="nav-badge" id="alertBadge" style="display:none">0</span>
    </a>
    <div class="nav-section-label">Tools</div>
    <a href="learn.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      Learn &amp; Protect
    </a>
    <a href="checker.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      URL Checker
    </a>
    <a href="report.html" class="nav-item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Report Fraud
    </a>
  </nav>
        <div class="sidebar-footer">
        <div class="sidebar-user" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div class="user-avatar" id="sidebarAvatar">AM</div>
            <div>
              <div class="user-name" id="sidebarName">Athul M R</div>
              <div class="user-status">
                <span class="status-dot"></span> Protected
              </div>
            </div>
          </div>
          <button onclick="logout()" style="background: none; border: none; color: var(--danger); cursor: pointer; padding: 8px;" title="Log Out">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>
  </div>
</aside>

<main class="main-content">
  <header class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-title">
      <h1>Security Alerts</h1>
      <p style="font-size:0.82rem;color:var(--t3);margin-top:2px">Real-time threat monitoring and history</p>
    </div>
    <div class="topbar-end">
      <button class="btn btn-ghost" id="markAllReadBtn" onclick="markAllRead()" style="font-size:0.82rem;padding:8px 16px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
        Mark All Read
      </button>
          <button class="icon-btn" onclick="logout()" title="Log Out" style="color: var(--danger);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </header>

  <div class="page-body">

    <!-- Summary Bar -->
    <div class="alerts-summary-bar anim-up" style="grid-template-columns: 1fr 1fr; gap: 1.5rem">
      <div class="summary-tile">
        <div class="summary-tile-icon si-crimson">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L3 6.5v5.5C3 17.5 7 22 12 23c5-1 9-5.5 9-11V6.5L12 2z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div>
          <div class="stile-count" style="color:var(--crimson-lt)" id="cnt-critical">0</div>
          <div class="stile-label">Critical Risks</div>
        </div>
      </div>
      <div class="summary-tile">
        <div class="summary-tile-icon si-amber">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div>
          <div class="stile-count" style="color:var(--amber-lt)" id="cnt-warning">0</div>
          <div class="stile-label">Warnings</div>
        </div>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs anim-up" id="filterTabs">
      <button class="filter-tab active" data-filter="all" onclick="filterAlerts('all',this)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All Risks
      </button>
      <button class="filter-tab" data-filter="critical" onclick="filterAlerts('critical',this)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L3 6.5v5.5C3 17.5 7 22 12 23c5-1 9-5.5 9-11V6.5L12 2z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Critical
      </button>
      <button class="filter-tab" data-filter="warning" onclick="filterAlerts('warning',this)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Warnings
      </button>
    </div>

    <!-- Alert List -->
    <div id="alertsContainer" style="display:flex;flex-direction:column;gap:0.875rem;margin-bottom:2rem"></div>

  </div>
</main>
</div><!-- /.app-body -->

<!-- Alert Detail Modal -->
<div class="modal-overlay" id="alertModal">
  <div class="modal-box" style="max-width:560px">
    <button class="modal-close-btn" onclick="closeModal('alertModal')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="alertModalContent"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/icons.js"></script>
<script src="js/auth.js"></script>
<script src="js/alerts.js?v=3.0"></script>
<script>
  // Bootstrap: runs after ALL scripts — no DOMContentLoaded race
  (function() {
    const user = JSON.parse(localStorage.getItem('fraudshield_session') || 'null');
    if (!user || !user.id) {
      console.warn('Alerts page: no session');
      return;
    }
    console.log('Alerts bootstrap: loading for user', user.id);
    fetchAlerts(user.id);
  })();
</script>
</body>
</html>
